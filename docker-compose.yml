services:
  ai:
    build:
      context: ./services/ai
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./services/ai/data:/app/data
      - ~/Documents/xninetzy:/app/obsidian-vault
      - wa-media:/app/data/wa-media      # shared with wa-enggine for media download

  wa-enggine:
    build:
      context: ./services/wa-enggine
    env_file:
      - .env
    environment:
      WA_AUTH_DIR: /app/sessions
      AI_BASE_URL: http://ai:8000
      AI_CHAT_ENDPOINT: /api/chat
      AI_TIMEOUT_MS: "120000"
      MCP_SERVER_ENABLED: "true"
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8081"
      WA_PAIRING_WAIT_MS: "90000"
      WA_PAIRING_RECONNECT_DELAY_MS: "30000"
      WA_GROUP_TRIGGER_MODE: mention_or_prefix
      WA_COMMAND_PREFIX: "!"
      WA_MEDIA_DIR: /app/data/wa-media
    depends_on:
      - ai
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ./services/wa-enggine/sessions:/app/sessions
      - wa-media:/app/data/wa-media      # shared with ai service

  cli:
    build:
      context: ./apps/cli
    env_file:
      - .env
    profiles:
      - tools
    stdin_open: true
    tty: true
    environment:
      XNINETZY_AI_URL: http://ai:8000

volumes:
  wa-media:
